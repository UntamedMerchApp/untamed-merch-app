<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Untamed Merch</title>

  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Untamed Merch" />

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* Guaranteed splash screen */
    #splash {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: url('untamed-merch-splash-1290x2796.png') center/cover no-repeat;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <!-- HTML splash that ALWAYS shows -->
  <div id="splash"></div>

  <script>
    // IMPORTANT: No service worker registration here.
    // It was causing the black-screen hijack.

    // Force iOS to render the splash BEFORE starting the redirect timer
    window.addEventListener('load', () => {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {

          // 7-second splash + cache-busting redirect
          setTimeout(() => {
            window.location.replace(
              "https://untamed-fitness-training.printify.me/?t=" + Date.now()
            );
          }, 7000);

        });
      });
    });
  </script>

</body>
</html>
